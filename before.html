<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matcha Lifecycle System</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Playfair+Display:wght@400&display=swap" rel="stylesheet">

<style>

/* ---------------- GLOBAL ---------------- */

body{
margin:0;
font-family:'Noto Serif JP', serif;
color:#1c1c1c;
overflow-x:hidden;
background:#f6f5f0;
position:relative;
}

/* Washi Texture Overlay */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url('https://www.transparenttextures.com/patterns/washi.png');
opacity:0.06;
pointer-events:none;
z-index:-1;
}

/* ---------------- NAV ---------------- */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
background:white;
box-shadow:0 3px 15px rgba(0,0,0,0.05);
position:sticky;
top:0;
z-index:100;
}

.nav-links a{
margin-left:30px;
text-decoration:none;
color:#333;
font-size:14px;
letter-spacing:.5px;
}

/* ---------------- HERO ---------------- */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:0 40px;
}

h1{
font-family:'Playfair Display', serif;
font-size:46px;
font-weight:400;
margin-bottom:20px;
}

.subtitle{
max-width:750px;
line-height:1.8;
color:#555;
}

/* ---------------- SCROLL SECTION ---------------- */

.scroll-section{
height:280vh;
position:relative;
margin-top:120px; /* pushes diagram lower */
}

.diagram-wrapper{
position:sticky;
top:50vh;
transform:translateY(-50%);
height:720px;
display:flex;
justify-content:center;
}

/* ---------------- DIAGRAM ---------------- */

.system-diagram{
position:relative;
width:720px;
height:720px;
transition:.6s ease;
}

/* Ring Labels */

.ring-label{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
color:#2f5d3a;
opacity:0;
transition:opacity .5s ease;
pointer-events:none;
}

.label-outer{ top:20px; }
.label-middle{ top:45px; }
.label-inner{ top:70px; }

.focus-outer .label-outer{ opacity:1; }
.focus-middle .label-middle{ opacity:1; }
.focus-inner .label-inner{ opacity:1; }

/* Rings */

.ring{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border-radius:50%;
border:1px solid rgba(47,93,58,0.08);
transition:.6s ease;
}

.outer{
width:680px;
height:680px;
}

.middle{
width:480px;
height:480px;
border-width:1.5px;
}

.inner{
width:320px;
height:320px;
border-width:2px;
}

.focus-outer .outer,
.focus-middle .middle,
.focus-inner .inner{
border-color:#2f5d3a;
box-shadow:
0 0 0 6px rgba(47,93,58,0.05),
0 0 35px rgba(47,93,58,0.15);
}

.focus-outer .middle,
.focus-outer .inner,
.focus-middle .outer,
.focus-middle .inner,
.focus-inner .outer,
.focus-inner .middle{
opacity:.25;
}

/* Bowl */

.system-diagram img{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:220px;
pointer-events:none;
z-index:1;
}

/* ---------------- HOTSPOTS ---------------- */

.hotspot-container{
position:absolute;
z-index:20;
}

.hotspot{
width:12px;
height:12px;
border-radius:50%;
cursor:pointer;
animation:pulse 2.6s infinite;
}

.bio .hotspot{ background:#2f5d3a; }
.craft .hotspot{ background:#6b7d5c; }
.sensory .hotspot{ background:#a3b18a; }

@keyframes pulse{
0%{ box-shadow:0 0 0 0 rgba(47,93,58,0.35); }
70%{ box-shadow:0 0 0 14px rgba(47,93,58,0); }
100%{ box-shadow:0 0 0 0 rgba(47,93,58,0); }
}

/* Fade inactive layers */

.focus-outer .craft,
.focus-outer .sensory,
.focus-middle .bio,
.focus-middle .sensory,
.focus-inner .bio,
.focus-inner .craft{
opacity:.2;
}

/* Info */

.info{
position:absolute;
width:260px;
background:white;
padding:18px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
opacity:0;
transition:.3s ease;
font-size:12px;
line-height:1.8;
pointer-events:none;
z-index:30;
}

.hotspot:hover + .info{
opacity:1;
}

</style>
</head>

<body>

<div class="navbar">
<div>Matcha Practicum</div>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="before.html">Before</a>
<a href="during.html">During</a>
<a href="after.html">After</a>
</div>
</div>

<section class="hero">
<h1>The Matcha Lifecycle System</h1>
<p class="subtitle">
Biological potential defines possibility. Craft refines it. Sensory perception reveals it.
Scroll to explore each nested layer of influence.
</p>
</section>

<section class="scroll-section" id="scroll-section">

<div class="diagram-wrapper">
<div class="system-diagram focus-outer" id="diagram">

<div class="ring-label label-outer">Biological Foundations</div>
<div class="ring-label label-middle">Craft & Processing</div>
<div class="ring-label label-inner">Sensory Expression</div>

<div class="ring outer"></div>
<div class="ring middle"></div>
<div class="ring inner"></div>

<img src="matcha-bowl.png" alt="Matcha Bowl">

<!-- Keep your existing hotspot-container blocks here unchanged -->

</div>
</div>

</section>

<script>
const diagram = document.getElementById("diagram");
const section = document.getElementById("scroll-section");

window.addEventListener("scroll", () => {
const rect = section.getBoundingClientRect();
const total = section.offsetHeight - window.innerHeight;
const progress = Math.min(Math.max(-rect.top / total, 0), 1);

if(progress < 0.33){
diagram.className = "system-diagram focus-outer";
}
else if(progress < 0.66){
diagram.className = "system-diagram focus-middle";
}
else{
diagram.className = "system-diagram focus-inner";
}
});
</script>

</body>
</html>
